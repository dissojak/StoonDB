name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release Artifact
        run: |
          brew install create-dmg
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "${GITHUB_REF_NAME:-manual}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoonDB-macOS
          path: |
            dist/*.zip
            dist/*.dmg

      - name: Remove Legacy Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            let release;

            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              release = response.data;
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release for ${tag}; nothing to clean.`);
                return;
              }
              throw error;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              per_page: 100
            });

            const legacyAssets = assets.filter((asset) =>
              /^ServerSQLPanel-.*\.(dmg|zip)$/i.test(asset.name)
            );

            core.info(`Found ${legacyAssets.length} legacy assets to delete.`);

            for (const asset of legacyAssets) {
              core.info(`Deleting legacy asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id
              });
            }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.dmg
          generate_release_notes: true
